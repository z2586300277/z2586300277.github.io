    .desc {

    .pills {

      margin-bottom: 32px;
      opacity: 0; animation: up 0.5s 0.45s ease forwards;
    }
    .pill {

      padding: 4px 13px; border-radius: 99px;

    .btn-main {

    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 0 44px rgba(76,29,149,0.7); }

    .btn-out {

    footer {

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  <script>(function () {
      const canvas = document.getElementById('c');
      const ctx = canvas.getContext('2d');
      let W, H, stars = [], mouse = { x: -999, y: -999 };
      const N = 140;

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      function init() {
        stars = Array.from({ length: N }, () => ({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() * 1.3 + 0.3,
          vx: (Math.random() - 0.5) * 0.12,
          vy: (Math.random() - 0.5) * 0.12,
          tw: Math.random() * Math.PI * 2,
          a: Math.random() * 0.5 + 0.3
        }));
      }

      function draw() {
        ctx.clearRect(0, 0, W, H);
        stars.forEach(s => {
          s.tw += 0.013;
          const a = s.a * (0.65 + 0.35 * Math.sin(s.tw));

          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(168,139,250,${a})`;
          ctx.fill();

          const dx = s.x - mouse.x, dy = s.y - mouse.y;
          const d = Math.sqrt(dx * dx + dy * dy);
          if (d < 100) {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r * 2.8, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0,212,255,${0.28 * (1 - d / 100)})`;
            ctx.fill();
          }

          s.x += s.vx; s.y += s.vy;
          if (s.x < 0) s.x = W; if (s.x > W) s.x = 0;
          if (s.y < 0) s.y = H; if (s.y > H) s.y = 0;
        });

        for (let i = 0; i < stars.length; i++) {
          for (let j = i + 1; j < stars.length; j++) {
            const dx = stars[i].x - stars[j].x, dy = stars[i].y - stars[j].y;
            const d = Math.sqrt(dx * dx + dy * dy);
            if (d < 85) {
              ctx.beginPath();
              ctx.moveTo(stars[i].x, stars[i].y);
              ctx.lineTo(stars[j].x, stars[j].y);
              ctx.strokeStyle = `rgba(108,99,255,${0.16 * (1 - d / 85)})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(draw);
      }

      window.addEventListener('resize', () => { resize(); init(); });
      window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
      resize(); init(); draw();
    })();
  </script>
